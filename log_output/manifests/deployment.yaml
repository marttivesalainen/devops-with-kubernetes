apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: log-volume
          emptyDir: {}
      containers:
        - name: string-generator
          image: marttivesalainen/dwk1.10-generator:latest
          volumeMounts:
            - name: log-volume
              mountPath: /tmp/log-output
        - name: server
          image: marttivesalainen/dwk1.10-server:latest
          volumeMounts:
            - name: log-volume
              mountPath: /tmp/log-output