apiVersion: apps/v1
kind: Deployment
metadata:
  name: log_output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log_output
  template:
    metadata:
      labels:
        app: log_output
    spec:
      containers:
        - name: log_output
          image: marttivesalainen/dwk-app1:latest