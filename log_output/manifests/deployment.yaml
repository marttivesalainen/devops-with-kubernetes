apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-volume
          persistentVolumeClaim:
            claimName: shared-claim
      containers:
        - name: string-generator
          image: marttivesalainen/dwk-generator:1.11
          volumeMounts:
            - name: shared-volume
              mountPath: /tmp/log-output
        - name: server
          image: marttivesalainen/dwk-server:1.11
          volumeMounts:
            - name: shared-volume
              mountPath: /tmp/log-output